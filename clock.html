<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Clock ⏰</title>

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: 'Arial', sans-serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
padding: 20px;
}

.container {
max-width: 1200px;
width: 100%;
}

.title {
text-align: center;
color: white;
margin-bottom: 40px;
font-size: 2.5rem;
text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.clocks-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
gap: 20px;
}

.clock-card {
background: rgba(255, 255, 255, 0.1);
backdrop-filter: blur(10px);
border-radius: 20px;
padding: 30px;
text-align: center;
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
border: 1px solid rgba(255, 255, 255, 0.2);
transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.clock-card:hover {
transform: translateY(-10px);
box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
}

.location {
font-size: 1.2rem;
color: #fff;
margin-bottom: 15px;
font-weight: bold;
}

.timezone {
font-size: 0.9rem;
color: rgba(255, 255, 255, 0.8);
margin-bottom: 20px;
}

.time-display {
font-size: 3rem;
font-weight: bold;
color: #fff;
font-family: 'Courier New', monospace;
margin-bottom: 10px;
text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
letter-spacing: 2px;
}

.date-display {
font-size: 0.95rem;
color: rgba(255, 255, 255, 0.9);
}

.flag {
font-size: 3rem;
margin-bottom: 10px;
}

@media (max-width: 768px) {
.title {
font-size: 1.8rem;
}

.clocks-grid {
grid-template-columns: 1fr;
}

.time-display {
font-size: 2.2rem;
}
}

@media (max-width: 480px) {
.title {
font-size: 1.5rem;
}

.clock-card {
padding: 20px;
}

.time-display {
font-size: 2rem;
}

.location {
font-size: 1rem;
}
}
</style>
</head>

<body>

<div class="container">
<h1 class="title">🌍 World Clock</h1>

<div class="clocks-grid" id="clocks-container">
<!-- Clocks will be generated here -->
</div>
</div>

<script>
const timezones = [
{
city: "New York",
timezone: "America/New_York",
flag: "🇺🇸"
},
{
city: "London",
timezone: "Europe/London",
flag: "🇬🇧"
},
{
city: "Paris",
timezone: "Europe/Paris",
flag: "🇫🇷"
},
{
city: "Tokyo",
timezone: "Asia/Tokyo",
flag: "🇯🇵"
},
{
city: "Sydney",
timezone: "Australia/Sydney",
flag: "🇦🇺"
},
{
city: "Dubai",
timezone: "Asia/Dubai",
flag: "🇦🇪"
},
{
city: "Singapore",
timezone: "Asia/Singapore",
flag: "🇸🇬"
},
{
city: "Hong Kong",
timezone: "Asia/Hong_Kong",
flag: "🇭🇰"
},
{
city: "Mumbai",
timezone: "Asia/Kolkata",
flag: "🇮🇳"
},
{
city: "Los Angeles",
timezone: "America/Los_Angeles",
flag: "🇺🇸"
},
{
city: "Bangkok",
timezone: "Asia/Bangkok",
flag: "🇹🇭"
},
{
city: "Moscow",
timezone: "Europe/Moscow",
flag: "🇷🇺"
}
];

function formatTime(date) {
return date.toLocaleTimeString('en-US', {
hour: '2-digit',
minute: '2-digit',
second: '2-digit',
hour12: true
});
}

function formatDate(date) {
return date.toLocaleDateString('en-US', {
weekday: 'short',
month: 'short',
day: 'numeric',
year: 'numeric'
});
}

function getUTCOffset(timezone) {
const formatter = new Intl.DateTimeFormat('en-US', {
timeZone: timezone,
hour: '2-digit',
minute: '2-digit',
second: '2-digit',
hour12: false
});

const now = new Date();
const utcString = now.toLocaleString('en-US', { timeZone: 'UTC' });
const tzString = now.toLocaleString('en-US', { timeZone: timezone });

const utcDate = new Date(utcString);
const tzDate = new Date(tzString);

const diffMs = tzDate - utcDate;
const diffHours = diffMs / (1000 * 60 * 60);

return diffHours >= 0 ? `UTC+${Math.abs(diffHours)}` : `UTC${diffHours}`;
}

function createClockCard(tz) {
const card = document.createElement('div');
card.className = 'clock-card';

const now = new Date();
const timeString = now.toLocaleTimeString('en-US', {
timeZone: tz.timezone,
hour: '2-digit',
minute: '2-digit',
second: '2-digit',
hour12: true
});

const dateString = now.toLocaleDateString('en-US', {
timeZone: tz.timezone,
weekday: 'short',
month: 'short',
day: 'numeric'
});

const offset = getUTCOffset(tz.timezone);

card.innerHTML = `
<div class="flag">${tz.flag}</div>
<div class="location">${tz.city}</div>
<div class="timezone">${offset}</div>
<div class="time-display" id="time-${tz.city}">${timeString}</div>
<div class="date-display">${dateString}</div>
`;

return card;
}

function updateClocks() {
timezones.forEach(tz => {
const timeElement = document.getElementById(`time-${tz.city}`);
if (timeElement) {
const now = new Date();
const timeString = now.toLocaleTimeString('en-US', {
timeZone: tz.timezone,
hour: '2-digit',
minute: '2-digit',
second: '2-digit',
hour12: true
});
timeElement.textContent = timeString;
}
});
}

function init() {
const container = document.getElementById('clocks-container');
timezones.forEach(tz => {
container.appendChild(createClockCard(tz));
});
updateClocks();
setInterval(updateClocks, 1000);
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
