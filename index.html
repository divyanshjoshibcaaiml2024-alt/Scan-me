<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Me! 💕</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#ff5fa2,#ff9c52);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
padding:20px;
box-sizing:border-box;
}

.card{
width:100%;
max-width:500px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
padding:40px;
border-radius:30px;
text-align:center;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
font-size:2.5rem;
margin-bottom:30px;
}

.qr-container{
background:white;
padding:20px;
border-radius:20px;
display:inline-block;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.qr-container canvas{
width:300px;
height:300px;
}

p{
font-size:1.1rem;
line-height:1.8;
margin-top:30px;
}

.or-text{
margin:20px 0;
font-size:1rem;
}

.direct-link{
display:inline-block;
margin-top:20px;
padding:12px 30px;
background:white;
color:#ff2d75;
text-decoration:none;
border-radius:25px;
font-weight:bold;
transition:all 0.3s ease;
}

.direct-link:hover{
transform:scale(1.05);
}

.footer{
margin-top:30px;
font-size:1rem;
opacity:0.9;
}

@media (max-width:480px){
h1{
font-size:2rem;
}

.card{
padding:25px;
}

.qr-container canvas{
width:250px;
height:250px;
}

p{
font-size:1rem;
}
}
</style>
</head>

<body>

<div class="card">

<h1>Scan Me! 💕</h1>

<div class="qr-container">
<canvas id="qrcode"></canvas>
</div>

<p>
Point your camera at this QR code and tap the notification to open your special surprise! 📱✨
</p>

<div class="or-text">OR</div>

<a href="proposal.html" class="direct-link">Open Proposal 💕</a>

<div class="footer">
— From Divyansh ❤️
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// Generate QR code
const proposalURL = 'https://divyanshjoshibcaaiml2024-alt.github.io/Scan-me/proposal.html';

new QRCode(document.getElementById("qrcode"), {
  text: proposalURL,
  width: 300,
  height: 300,
  colorDark: "#000000",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});
</script>

</body>
</html>
