<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Me! 💕</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#ff5fa2,#ff9c52);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

.card{
width:90%;
max-width:500px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
padding:40px;
border-radius:30px;
text-align:center;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
font-size:42px;
margin-bottom:30px;
}

.qr-container{
background:white;
padding:20px;
border-radius:20px;
display:inline-block;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.qr-container img{
width:300px;
height:300px;
}

p{
font-size:18px;
line-height:1.8;
margin-top:30px;
}

.footer{
margin-top:30px;
font-size:16px;
opacity:0.9;
}
</style>
</head>

<body>

<div class="card">

<h1>Scan Me! 💕</h1>

<div class="qr-container">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://divyanshjoshibcaaiml2024-alt.github.io/Scan-me/proposal.html" alt="QR Code">
</div>

<p>
Point your camera at this QR code and tap the notification to open your special surprise! 📱✨
</p>

<div class="footer">
— From Divyansh ❤️
</div>

</div>

</body>
</html>
